<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cyrille Mvomo</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="top-banner" id="top-banner">
  <div class="banner-container">

    <div class="banner-left">
      <h1>Cyrille E. Mvomo</h1>
    </div>

    <div class="banner-right-wrapper">
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="banner-right" id="banner-nav">
        <a href="#">About</a>
        <a href="#">CV</a>
        <a href="#">News</a>
        <a href="#">Research</a>
        <a href="#">Teaching</a>
        <a href="#">Service</a>
        <span id="theme-toggle" class="toggle">☾</span>
      </nav>
    </div>

  </div>
</header>

<main class="page-container">
  <section class="hero-section">

    <div class="profile-column">
      <img src="profile.jpg" alt="Cyrille" class="profile-photo" />

      <div class="icon-row">
        <a href="mailto:cyrille.mvomo@mail.mcgill.ca"><i class="fa-regular fa-envelope"></i></a>
        <a href="https://github.com/cyrillemvomo" target="_blank"><i class="fa-brands fa-github"></i></a>
        <a href="https://scholar.google.com" target="_blank"><i class="fa-solid fa-graduation-cap"></i></a>
        <a href="https://linkedin.com" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
        <a href="https://orcid.org" target="_blank"><i class="fa-brands fa-orcid"></i></a>
        <a href="https://researchgate.net" target="_blank"><i class="fa-brands fa-researchgate"></i></a>
      </div>

      <div class="profile-details">
        <p>Montreal, Canada</p>
        <p><strong>McGill University</strong></p>
        <p>Sir Arthur Currie Room 101</p>
      </div>
    </div>

    <div class="description-column">
      <p>
        Hi! I’m <strong>Cyrille Mvomo</strong>, a PhD candidate at
        <a href="https://www.mcgill.ca/" target="_blank" class="text-link">McGill University</a>.
      </p>
    </div>

  </section>
</main>

<script>
const body = document.body;
const themeToggle = document.getElementById("theme-toggle");
const topBanner = document.getElementById("top-banner");
const menuToggle = document.getElementById("menu-toggle");

/* Theme */
themeToggle.addEventListener("click", () => {
  body.classList.toggle("dark-mode");
  themeToggle.classList.toggle("active");
});

/* Mobile menu */
menuToggle.addEventListener("click", () => {
  topBanner.classList.toggle("menu-open");
  menuToggle.classList.toggle("menu-open");
});
</script>

</body>
</html>
